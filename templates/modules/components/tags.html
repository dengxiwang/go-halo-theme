<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <!-- 所有标签 -->
  <ul
    th:if="${!#lists.isEmpty(tagFinder.listAll()) && theme.config.firstPage.tagsShowNumber != '0'}"
    th:with="tags=${tagFinder.listAll()}, 
              tagLimit=${(theme.config.firstPage.tagsShowNumber != null) ? T(java.lang.Integer).valueOf(theme.config.firstPage.tagsShowNumber) : 0},
              totalTags=${#lists.size(tags)}"
    th:fragment="tags"
    class="flex flex-wrap gap-2 rounded-lg border bg-white p-3 font-medium"
  >
    <!-- 你的原版标签遍历（完全没动） -->
    <li th:each="currentTag, stat : ${tags}" th:if="${tagLimit <= 0 or stat.index < tagLimit}" class="group">
      <a
        th:href="@{${currentTag.status.permalink}}"
        class="inline-flex items-center rounded-full bg-gray-100 px-3 py-1 text-sm font-medium transition-all hover:bg-blue-100 hover:text-blue-600"
        th:classappend="${currentTag.metadata.name == tag.metadata.name} ? 'active-menu'"
      >
        <span th:text="|# ${currentTag.spec.displayName}|">标签名</span>
        <span class="ml-1 text-xs" th:text="'(' + ${currentTag.postCount ?: 0} + ')'"></span>
      </a>
    </li>

    <!-- 新增：更多按钮 → 总数>设置数量才显示，跳转到 /tags -->
    <li th:if="${tagLimit > 0 && totalTags > tagLimit}" class="group">
      <a
        href="/tags"
        class="inline-flex items-center rounded-full bg-gray-100 px-3 py-1 text-sm font-medium transition-all hover:bg-blue-100 hover:text-blue-600"
      >
        更多 +
      </a>
    </li>
  </ul>
</html>
